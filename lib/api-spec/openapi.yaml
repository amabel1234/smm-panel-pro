openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: SMM Panel Pro API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: users
    description: User management
  - name: services
    description: SMM services
  - name: orders
    description: Order management
  - name: deposits
    description: Deposit management
  - name: transactions
    description: Transaction history
  - name: nokos
    description: Virtual number / nokos
  - name: tickets
    description: Support tickets
  - name: notifications
    description: Notifications
  - name: referrals
    description: Referral system
  - name: admin
    description: Admin operations
  - name: dashboard
    description: Dashboard stats

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout user
      responses:
        "200":
          description: Logged out

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized

  /users/profile:
    patch:
      operationId: updateProfile
      tags: [users]
      summary: Update user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/api-key:
    get:
      operationId: getApiKey
      tags: [users]
      summary: Get user API key
      responses:
        "200":
          description: API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeyResponse"
    post:
      operationId: regenerateApiKey
      tags: [users]
      summary: Regenerate API key
      responses:
        "200":
          description: New API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeyResponse"

  /services:
    get:
      operationId: listServices
      tags: [services]
      summary: List all services
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: platform
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Services list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Service"

  /services/categories:
    get:
      operationId: listServiceCategories
      tags: [services]
      summary: List service categories
      responses:
        "200":
          description: Categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ServiceCategory"

  /services/featured:
    get:
      operationId: listFeaturedServices
      tags: [services]
      summary: Featured/popular services
      responses:
        "200":
          description: Featured services
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Service"

  /services/{id}:
    get:
      operationId: getService
      tags: [services]
      summary: Get service by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Service
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"

  /services/{id}/favorite:
    post:
      operationId: toggleFavoriteService
      tags: [services]
      summary: Toggle service favorite
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Toggled

  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List user orders
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Orders
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderListResponse"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Create new order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderInput"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Insufficient balance or invalid

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get order by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}/refill:
    post:
      operationId: refillOrder
      tags: [orders]
      summary: Request order refill
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Refill requested

  /deposits:
    get:
      operationId: listDeposits
      tags: [deposits]
      summary: List user deposits
      responses:
        "200":
          description: Deposits
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Deposit"
    post:
      operationId: createDeposit
      tags: [deposits]
      summary: Create deposit request (QRIS)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DepositInput"
      responses:
        "201":
          description: Deposit created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deposit"

  /deposits/{id}:
    get:
      operationId: getDeposit
      tags: [deposits]
      summary: Get deposit status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deposit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deposit"

  /transactions:
    get:
      operationId: listTransactions
      tags: [transactions]
      summary: List user transactions
      parameters:
        - name: type
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"

  /nokos/countries:
    get:
      operationId: listNokosCountries
      tags: [nokos]
      summary: List available countries for virtual numbers
      responses:
        "200":
          description: Countries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NokosCountry"

  /nokos/apps:
    get:
      operationId: listNokosApps
      tags: [nokos]
      summary: List apps available for OTP
      parameters:
        - name: country
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Apps
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NokosApp"

  /nokos/numbers:
    get:
      operationId: listActiveNumbers
      tags: [nokos]
      summary: List user's active numbers
      responses:
        "200":
          description: Active numbers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NokosNumber"
    post:
      operationId: buyNumber
      tags: [nokos]
      summary: Buy virtual number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BuyNumberInput"
      responses:
        "201":
          description: Number assigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NokosNumber"

  /nokos/numbers/{id}:
    get:
      operationId: getNumber
      tags: [nokos]
      summary: Get number details and OTP
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Number with OTP history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NokosNumber"

  /nokos/numbers/{id}/cancel:
    post:
      operationId: cancelNumber
      tags: [nokos]
      summary: Cancel number and request refund
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Cancelled

  /tickets:
    get:
      operationId: listTickets
      tags: [tickets]
      summary: List user tickets
      responses:
        "200":
          description: Tickets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Ticket"
    post:
      operationId: createTicket
      tags: [tickets]
      summary: Create support ticket
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TicketInput"
      responses:
        "201":
          description: Ticket created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ticket"

  /tickets/{id}/reply:
    post:
      operationId: replyTicket
      tags: [tickets]
      summary: Reply to ticket
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TicketReplyInput"
      responses:
        "200":
          description: Reply sent

  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: List user notifications
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  /notifications/read-all:
    post:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark all notifications as read
      responses:
        "200":
          description: Marked

  /referrals:
    get:
      operationId: getReferralInfo
      tags: [referrals]
      summary: Get user referral info and earnings
      responses:
        "200":
          description: Referral info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferralInfo"

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get user dashboard statistics
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/recent-orders:
    get:
      operationId: getRecentOrders
      tags: [dashboard]
      summary: Get recent orders for dashboard
      responses:
        "200":
          description: Recent orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Admin dashboard statistics
      responses:
        "200":
          description: Admin stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/users:
    get:
      operationId: adminListUsers
      tags: [admin]
      summary: Admin list all users
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /admin/users/{id}/balance:
    patch:
      operationId: adminUpdateUserBalance
      tags: [admin]
      summary: Admin update user balance
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BalanceUpdate"
      responses:
        "200":
          description: Updated

  /admin/services:
    get:
      operationId: adminListServices
      tags: [admin]
      summary: Admin list services
      responses:
        "200":
          description: Services
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Service"
    post:
      operationId: adminCreateService
      tags: [admin]
      summary: Admin create service
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"

  /admin/orders:
    get:
      operationId: adminListOrders
      tags: [admin]
      summary: Admin list all orders
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Orders
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderListResponse"

  /admin/deposits:
    get:
      operationId: adminListDeposits
      tags: [admin]
      summary: Admin list all deposits
      responses:
        "200":
          description: Deposits
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Deposit"

  /admin/deposits/{id}/approve:
    post:
      operationId: adminApproveDeposit
      tags: [admin]
      summary: Admin approve deposit
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Approved

  /admin/broadcast:
    post:
      operationId: adminBroadcast
      tags: [admin]
      summary: Broadcast notification to all users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BroadcastInput"
      responses:
        "200":
          description: Sent

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    RegisterInput:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
        referralCode:
          type: ["string", "null"]

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"

    User:
      type: object
      required: [id, name, email, balance, role, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        balance:
          type: number
        role:
          type: string
          enum: [user, admin]
        referralCode:
          type: ["string", "null"]
        totalOrders:
          type: ["integer", "null"]
        totalDeposited:
          type: ["number", "null"]
        createdAt:
          type: string

    ProfileUpdate:
      type: object
      properties:
        name:
          type: string
        currentPassword:
          type: ["string", "null"]
        newPassword:
          type: ["string", "null"]

    ApiKeyResponse:
      type: object
      required: [apiKey]
      properties:
        apiKey:
          type: string

    Service:
      type: object
      required: [id, name, category, platform, price, minOrder, maxOrder, description, isActive]
      properties:
        id:
          type: integer
        name:
          type: string
        category:
          type: string
        platform:
          type: string
        price:
          type: number
        minOrder:
          type: integer
        maxOrder:
          type: integer
        description:
          type: string
        isActive:
          type: boolean
        refillAvailable:
          type: boolean
        avgCompletionTime:
          type: ["string", "null"]
        isFavorited:
          type: ["boolean", "null"]

    ServiceCategory:
      type: object
      required: [id, name, platform, icon, serviceCount]
      properties:
        id:
          type: integer
        name:
          type: string
        platform:
          type: string
        icon:
          type: string
        serviceCount:
          type: integer

    ServiceInput:
      type: object
      required: [name, category, platform, price, minOrder, maxOrder, description]
      properties:
        name:
          type: string
        category:
          type: string
        platform:
          type: string
        price:
          type: number
        minOrder:
          type: integer
        maxOrder:
          type: integer
        description:
          type: string
        refillAvailable:
          type: boolean
        isActive:
          type: boolean

    Order:
      type: object
      required: [id, serviceId, serviceName, platform, quantity, price, status, link, createdAt]
      properties:
        id:
          type: integer
        serviceId:
          type: integer
        serviceName:
          type: string
        platform:
          type: string
        quantity:
          type: integer
        price:
          type: number
        status:
          type: string
          enum: [pending, processing, completed, partial, cancelled, refunded]
        link:
          type: string
        startCount:
          type: ["integer", "null"]
        remains:
          type: ["integer", "null"]
        createdAt:
          type: string
        completedAt:
          type: ["string", "null"]

    OrderInput:
      type: object
      required: [serviceId, link, quantity]
      properties:
        serviceId:
          type: integer
        link:
          type: string
        quantity:
          type: integer

    OrderListResponse:
      type: object
      required: [orders, total, page, totalPages]
      properties:
        orders:
          type: array
          items:
            $ref: "#/components/schemas/Order"
        total:
          type: integer
        page:
          type: integer
        totalPages:
          type: integer

    Deposit:
      type: object
      required: [id, amount, method, status, createdAt]
      properties:
        id:
          type: integer
        amount:
          type: number
        method:
          type: string
        status:
          type: string
          enum: [pending, completed, failed, expired]
        qrisCode:
          type: ["string", "null"]
        qrisImageUrl:
          type: ["string", "null"]
        expiredAt:
          type: ["string", "null"]
        createdAt:
          type: string

    DepositInput:
      type: object
      required: [amount]
      properties:
        amount:
          type: number
        method:
          type: string

    Transaction:
      type: object
      required: [id, type, amount, balance, description, createdAt]
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [deposit, order, refund, referral, adjustment]
        amount:
          type: number
        balance:
          type: number
        description:
          type: string
        createdAt:
          type: string

    NokosCountry:
      type: object
      required: [code, name, flag]
      properties:
        code:
          type: string
        name:
          type: string
        flag:
          type: string
        phoneCode:
          type: string

    NokosApp:
      type: object
      required: [id, name, icon, price, stock]
      properties:
        id:
          type: integer
        name:
          type: string
        icon:
          type: string
        price:
          type: number
        stock:
          type: integer
        country:
          type: string

    NokosNumber:
      type: object
      required: [id, number, country, app, status, price, createdAt, expiresAt]
      properties:
        id:
          type: integer
        number:
          type: string
        country:
          type: string
        app:
          type: string
        status:
          type: string
          enum: [active, expired, cancelled, completed]
        price:
          type: number
        otp:
          type: ["string", "null"]
        otpHistory:
          type: array
          items:
            type: object
            required: [code, receivedAt]
            properties:
              code:
                type: string
              receivedAt:
                type: string
        createdAt:
          type: string
        expiresAt:
          type: string

    BuyNumberInput:
      type: object
      required: [appId, country]
      properties:
        appId:
          type: integer
        country:
          type: string

    Ticket:
      type: object
      required: [id, subject, status, priority, createdAt]
      properties:
        id:
          type: integer
        subject:
          type: string
        status:
          type: string
          enum: [open, replied, closed]
        priority:
          type: string
          enum: [low, medium, high]
        messages:
          type: array
          items:
            type: object
            required: [sender, message, createdAt]
            properties:
              sender:
                type: string
              message:
                type: string
              createdAt:
                type: string
        createdAt:
          type: string

    TicketInput:
      type: object
      required: [subject, message, priority]
      properties:
        subject:
          type: string
        message:
          type: string
        priority:
          type: string
          enum: [low, medium, high]

    TicketReplyInput:
      type: object
      required: [message]
      properties:
        message:
          type: string

    Notification:
      type: object
      required: [id, title, message, type, isRead, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        message:
          type: string
        type:
          type: string
          enum: [info, success, warning, error]
        isRead:
          type: boolean
        createdAt:
          type: string

    ReferralInfo:
      type: object
      required: [code, totalReferrals, totalEarnings, referrals]
      properties:
        code:
          type: string
        totalReferrals:
          type: integer
        totalEarnings:
          type: number
        referrals:
          type: array
          items:
            type: object
            required: [name, joinedAt, earned]
            properties:
              name:
                type: string
              joinedAt:
                type: string
              earned:
                type: number

    DashboardStats:
      type: object
      required: [balance, totalOrders, activeOrders, totalDeposited, spentThisMonth, pendingOrders]
      properties:
        balance:
          type: number
        totalOrders:
          type: integer
        activeOrders:
          type: integer
        pendingOrders:
          type: integer
        totalDeposited:
          type: number
        spentThisMonth:
          type: number
        completedOrders:
          type: integer
        cancelledOrders:
          type: integer

    AdminStats:
      type: object
      required: [totalUsers, totalRevenue, totalOrders, activeOrders, pendingDeposits, openTickets, revenueToday, revenueThisMonth]
      properties:
        totalUsers:
          type: integer
        totalRevenue:
          type: number
        totalOrders:
          type: integer
        activeOrders:
          type: integer
        pendingDeposits:
          type: integer
        openTickets:
          type: integer
        revenueToday:
          type: number
        revenueThisMonth:
          type: number
        newUsersToday:
          type: integer
        ordersToday:
          type: integer

    BalanceUpdate:
      type: object
      required: [amount, type]
      properties:
        amount:
          type: number
        type:
          type: string
          enum: [add, subtract, set]
        reason:
          type: string

    BroadcastInput:
      type: object
      required: [title, message, type]
      properties:
        title:
          type: string
        message:
          type: string
        type:
          type: string
          enum: [info, success, warning, error]
